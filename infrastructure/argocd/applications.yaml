apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aihealth-monitoring
  namespace: argocd
  labels:
    app: aihealth
    component: monitoring
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: HEAD
    chart: kube-prometheus-stack
    helm:
      values: |
        prometheus:
          prometheusSpec:
            retention: 15d
            resources:
              requests:
                memory: 400Mi
        grafana:
          adminPassword: admin
          persistence:
            enabled: true
            size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true