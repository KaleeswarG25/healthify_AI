apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aihealth-auth-service
  namespace: argocd
  labels:
    app: aihealth
    component: auth-service
spec:
  project: default
  source:
    repoURL: https://github.com/KaleeswarG25/healthify_AI
    path: infrastructure/kubernetes/helm
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: authService.enabled
          value: "true"
        - name: reportService.enabled
          value: "false"
        - name: aiService.enabled
          value: "false"
        - name: gateway.enabled
          value: "false"
        - name: frontend.enabled
          value: "false"
        - name: postgresql.enabled
          value: "true"
        - name: redis.enabled
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: aihealth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
